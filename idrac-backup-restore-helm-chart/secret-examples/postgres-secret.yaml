# DO NOT COMMIT THIS FILE
# Fill in your values, seal it, then apply the sealed secret to your cluster
apiVersion: v1
kind: Secret
metadata:
  name: postgres-secret
  namespace:  #value as mentioned in the values.yaml
type: Opaque
stringData:
  POSTGRES_DB: #your-db-name
  POSTGRES_USER: #your-username
  POSTGRES_PASSWORD: #your-password